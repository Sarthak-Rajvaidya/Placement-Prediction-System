<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Register – PlaceAI</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="auth-body">
<div class="auth-card auth-card-wide">
  <div class="auth-header">
    <div class="auth-logo">🎓</div>
    <h1>Create Account</h1>
    <p>Register to get your AI placement prediction</p>
  </div>

  {% with messages = get_flashed_messages(with_categories=true) %}
  {% for cat, msg in messages %}
  <div class="alert alert-{{ cat }}">{{ msg }}</div>
  {% endfor %}
  {% endwith %}

  <form action="{{ url_for('student_register') }}" method="POST">
    <div class="form-row">
      <div class="form-group">
        <label>Full Name *</label>
        <input type="text" name="name" placeholder="John Doe" required>
      </div>
      <div class="form-group">
        <label>Email Address *</label>
        <input type="email" name="email" placeholder="john@email.com" required>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Password *</label>
        <input type="password" name="password" placeholder="Min 6 characters" required>
      </div>
      <div class="form-group">
        <label>Roll Number</label>
        <input type="text" name="roll_no" placeholder="CS2021001">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Branch</label>
        <select name="branch">
          <option value="">Select Branch</option>
          <option>Computer Science</option>
          <option>Information Technology</option>
          <option>Electronics & Communication</option>
          <option>Mechanical Engineering</option>
          <option>Civil Engineering</option>
          <option>MBA</option>
          <option>Other</option>
        </select>
      </div>
      <div class="form-group">
        <label>Current Year</label>
        <select name="year">
          <option value="">Select Year</option>
          <option>First Year</option>
          <option>Second Year</option>
          <option>Third Year</option>
          <option>Final Year</option>
        </select>
      </div>
    </div>
    <button type="submit" class="auth-btn">Create Account →</button>
  </form>

  <div class="auth-footer">
    <p>Already registered? <a href="{{ url_for('student_login') }}">Login here</a></p>
    <p><a href="{{ url_for('landing') }}">← Back to Home</a></p>
  </div>
</div>
</body>
</html>
